<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tagebuch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">
        <h1>Tagebuch</h1>
        <button id="btn-new" title="Neues Gespräch">+</button>
      </div>
      <ul id="conversation-list"></ul>
    </aside>

    <main id="chat">
      <div id="messages"></div>
      <form id="input-form">
        <textarea
          id="input"
          placeholder="Schreib hier…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" id="btn-send">Senden</button>
      </form>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
